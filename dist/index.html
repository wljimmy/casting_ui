        <div class="section">
            <h2>框架介绍</h2>
            <p>Casting UI 是一个采用原生HTML5、CSS和JavaScript开发的极简UI框架，无任何第三方依赖。</p>
            <p>主要功能包括：</p>
            <ul>
                <li>基础UI组件（按钮、输入框、卡片等）</li>
                <li>弹窗和消息提示</li>
                <li>图片放大功能</li>
                <li>主题管理</li>
                <li>颜色选择器</li>
                <li>菜单组件</li>
            </ul>
        </div>
