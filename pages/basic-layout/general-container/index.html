<section class="section">
    <h2>通用容器</h2>
    
    <!-- 流式容器 -->
    <div id="container-fluid" class="container-fluid" style="background-color: var(--bg-color); border-radius: var(--radius-md); margin-bottom: 16px;">
        <div class="example-title">
            <h4>流式容器</h4>
            <span class="example-info">#container-fluid.container-fluid</span>
        </div>
        <p>宽度100%，自适应父容器</p>
    </div>
    
    <!-- 固定宽容器 -->
    <div id="container-fixed-sm" class="container-fixed-sm" style="background-color: var(--bg-color); border-radius: var(--radius-md); margin-bottom: 16px;">
        <div class="example-title">
            <h4>小固定宽容器</h4>
            <span class="example-info">#container-fixed-sm.container-fixed-sm</span>
        </div>
        <p>宽度500px</p>
    </div>
    
    <!-- 网格容器 -->
    <div id="container-grid-3" class="container-grid-3" style="margin-bottom: 16px;">
        <div style="background-color: var(--bg-color); border-radius: var(--radius-md); padding: 16px;">
            <h4>网格项1</h4>
        </div>
        <div style="background-color: var(--bg-color); border-radius: var(--radius-md); padding: 16px;">
            <h4>网格项2</h4>
        </div>
        <div style="background-color: var(--bg-color); border-radius: var(--radius-md); padding: 16px;">
            <h4>网格项3</h4>
        </div>
    </div>
    
    <!-- 折叠面板 -->
    <div id="collapse-panel-1" class="collapse-panel" style="margin-bottom: 16px;">
        <div class="collapse-header">
            <h4>折叠面板1</h4>
            <span>▼</span>
        </div>
        <div class="collapse-content">
            <p>折叠面板内容</p>
        </div>
    </div>
    
    <div id="collapse-panel-2" class="collapse-panel" style="margin-bottom: 16px;">
        <div class="collapse-header">
            <h4>折叠面板2</h4>
            <span>▼</span>
        </div>
        <div class="collapse-content">
            <p>折叠面板内容</p>
        </div>
    </div>
    
    <!-- 侧边布局容器 -->
    <div id="layout-container" class="layout-container" style="margin-bottom: 16px;">
        <div class="layout-sidebar">
            <h4>侧边栏</h4>
            <ul style="list-style: none;">
                <li>菜单项1</li>
                <li>菜单项2</li>
                <li>菜单项3</li>
            </ul>
        </div>
        <div class="layout-content">
            <h4>内容区域</h4>
            <p>这里是主要内容区域</p>
        </div>
    </div>
    
    <!-- 顶部/底部布局容器 -->
    <div id="layout-header-footer" style="border: 1px solid var(--border-color); border-radius: var(--radius-md); overflow: hidden; margin-bottom: 16px;">
        <div class="layout-header">
            <h4>顶部导航栏</h4>
        </div>
        <div style="padding: 16px; min-height: 200px;">
            <h4>内容区域</h4>
            <p>这里是主要内容区域</p>
        </div>
        <div class="layout-footer">
            <p>底部版权信息</p>
        </div>
    </div>
</section>
