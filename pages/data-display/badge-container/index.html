<section class="section">
    <h2>标签/徽章</h2>
    
    <div class="badge-container container-grid-3 container-height-auto">
        <!-- 尺寸 -->
        <div style="display: flex; gap: 8px;">
            <span>尺寸：</span>
            <span id="badge-sm" class="badge badge-sm badge-primary">小徽章</span>
            <span id="badge-md" class="badge badge-md badge-primary">中徽章</span>
            <span id="badge-lg" class="badge badge-lg badge-primary">大徽章</span>
        </div>
        
        <!-- 样式 -->
        <div style="display: flex; gap: 8px;">
            <span>填充样式：</span>
            <span id="badge-primary" class="badge badge-primary">主要</span>
            <span id="badge-success" class="badge badge-success">成功</span>
            <span id="badge-warning" class="badge badge-warning">警告</span>
            <span id="badge-error" class="badge badge-error">错误</span>
        </div>
        
        <!-- 描边样式 -->
        <div id="transparent-bg-container-3" class="transparent-bg-container">
            <div class="transparent-bg-content">
                <div style="display: flex; gap: 8px;">
                    <span>描边样式：</span>
                    <span id="badge-outline-primary" class="badge badge-outline badge-primary">主要</span>
                    <span id="badge-outline-success" class="badge badge-outline badge-success">成功</span>
                    <span id="badge-outline-warning" class="badge badge-outline badge-warning">警告</span>
                    <span id="badge-outline-error" class="badge badge-outline badge-error">错误</span>
                </div>
            </div>
        </div>
        
        <!-- 带数字角标 -->
        <div style="display: flex; gap: 8px;">
            <span>带数字角标：</span>
            <span id="badge-with-count" class="badge badge-primary badge-with-count">
                消息
                <span class="badge-count">99+</span>
            </span>
        </div>
        
        <!-- 可关闭徽章 -->
        <div style="display: flex; gap: 8px;">
            <span>可关闭徽章：</span>
            <span id="badge-closeable" class="badge badge-closeable badge-primary">
                标签
                <button class="badge-close">&times;</button>
            </span>
        </div>
    </div>
</section>
