<section class="section">
    <h2>列表</h2>
    
    <div class="list-container container-height-auto">
        <!-- 普通列表 -->
        <div style="margin-bottom: 16px;">
            <h4>普通列表：</h4>
            <ul id="list-1" class="list">
                <li class="list-item">列表项1</li>
                <li class="list-item active">列表项2（激活状态）</li>
                <li class="list-item">列表项3</li>
            </ul>
        </div>
        
        <!-- 图文列表 -->
        <div style="margin-bottom: 16px;">
            <h4>图文列表：</h4>
            <ul id="list-2" class="list">
                <li class="list-item list-with-image">
                    <div class="list-image">
                        <img src="https://picsum.photos/100/100?random=7" alt="图片">
                    </div>
                    <div class="list-content">
                        <h5>列表标题</h5>
                        <p>列表内容描述</p>
                    </div>
                </li>
                <li class="list-item list-with-image">
                    <div class="list-image">
                        <img src="https://picsum.photos/100/100?random=8" alt="图片">
                    </div>
                    <div class="list-content">
                        <h5>列表标题</h5>
                        <p>列表内容描述</p>
                    </div>
                </li>
            </ul>
        </div>
        
        <!-- 可滑动列表 -->
        <div style="margin-bottom: 16px;">
            <h4>可滑动列表：</h4>
            <div id="list-scrollable" class="list-scrollable">
                <div class="list-item">滑动项1</div>
                <div class="list-item">滑动项2</div>
                <div class="list-item">滑动项3</div>
                <div class="list-item">滑动项4</div>
                <div class="list-item">滑动项5</div>
            </div>
        </div>
        
        <!-- 带操作按钮列表 -->
        <div style="margin-bottom: 16px;">
            <h4>带操作按钮列表：</h4>
            <ul id="list-3" class="list">
                <li class="list-item list-with-actions">
                    <span>列表项1</span>
                    <div class="list-actions">
                        <button class="btn btn-text">编辑</button>
                        <button class="btn btn-text">删除</button>
                    </div>
                </li>
                <li class="list-item list-with-actions">
                    <span>列表项2</span>
                    <div class="list-actions">
                        <button class="btn btn-text">编辑</button>
                        <button class="btn btn-text">删除</button>
                    </div>
                </li>
            </ul>
        </div>
    </div>
</section>
