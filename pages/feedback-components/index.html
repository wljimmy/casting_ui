<!-- 反馈组件 -->
<section id="feedback-components" class="section">
    <h2>反馈组件</h2>
    
    <!-- 弹窗 -->
    <div class="section-subtitle">
        <h3>弹窗</h3>
    </div>
    <div id="modal-container-1" class="modal-container container-grid-4 container-height-auto">
        <!-- 弹窗触发按钮 -->
        <button id="btn-modal1" class="btn btn-primary" onclick="showModalById('modal1')">信息弹窗</button>
        <button id="btn-modal2" class="btn btn-primary" onclick="showModalById('modal2')">确认弹窗</button>
        <button id="btn-modal3" class="btn btn-primary" onclick="showModalById('modal3')">顶部弹窗</button>
        <button id="btn-modal4" class="btn btn-primary" onclick="showModalById('modal4')">底部弹窗</button>
        <button id="btn-modal7" class="btn btn-primary" onclick="showModalById('modal7')">左侧弹窗</button>
        <button id="btn-modal8" class="btn btn-primary" onclick="showModalById('modal8')">右侧弹窗</button>
        <div id="transparent-bg-container-2" class="transparent-bg-container">
            <div class="transparent-bg-content">
                <button id="btn-modal5" class="btn btn-primary" onclick="showModalById('modal5')">毛玻璃弹窗</button>
            </div>
        </div>
        <button id="btn-modal6" class="btn btn-primary" onclick="showModalById('modal6')">带输入框的弹窗</button>
    </div>
    
    <!-- 遮罩测试按钮 -->
    <div id="modal-container-2" class="modal-container container-grid-4 container-height-auto" style="margin-top: 16px;">
        <h4>遮罩组件测试</h4>
        <button id="btn-overlay-transparent" class="btn btn-primary" onclick="testTransparentOverlay()">测试半透明遮罩</button>
        <button id="btn-overlay-glass" class="btn btn-primary" onclick="testGlassOverlay()">测试毛玻璃遮罩</button>
    </div>
    
    <!-- 消息提示组件测试按钮 -->
    <div id="modal-container-3" class="modal-container container-grid-4 container-height-auto" style="margin-top: 16px;">
        <h4>消息提示组件测试</h4>
        <button id="btn-message-info" class="btn btn-primary" onclick="testMessage('info')">测试信息消息</button>
        <button id="btn-message-success" class="btn btn-primary" onclick="testMessage('success')">测试成功消息</button>
        <button id="btn-message-warning" class="btn btn-primary" onclick="testMessage('warning')">测试警告消息</button>
        <button id="btn-message-error" class="btn btn-primary" onclick="testMessage('error')">测试错误消息</button>
    </div>

    <!-- Toast -->
    <div class="section-subtitle">
        <h3>Toast</h3>
    </div>
    <div id="toast-container" class="toast-container container-grid-4 container-height-auto">
        <!-- Toast触发按钮 -->
        <button id="btn-toast-success" class="btn btn-primary" onclick="showToast('success', '操作成功')">成功Toast</button>
        <button id="btn-toast-error" class="btn btn-primary" onclick="showToast('error', '操作失败')">错误Toast</button>
        <button id="btn-toast-warning" class="btn btn-primary" onclick="showToast('warning', '警告信息')">警告Toast</button>
        <button id="btn-toast-info" class="btn btn-primary" onclick="showToast('info', '提示信息')">信息Toast</button>
        <button id="btn-toast-top" class="btn btn-primary" onclick="showToast('success', '顶部Toast', 'top')">顶部Toast</button>
        <button id="btn-toast-bottom" class="btn btn-primary" onclick="showToast('success', '底部Toast', 'bottom')">底部Toast</button>
    </div>

    <!-- 加载类 -->
    <div class="section-subtitle">
        <h3>加载类</h3>
    </div>
    <div id="loading-container" class="loading-container container-height-auto">
        <!-- 加载动画 -->
        <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 16px;">
            <span>小加载动画：</span>
            <div id="loading-sm" class="loading loading-sm"></div>
            <span>中加载动画：</span>
            <div id="loading-md" class="loading"></div>
            <span>大加载动画：</span>
            <div id="loading-lg" class="loading loading-lg"></div>
        </div>
        
        <!-- 骨架屏 -->
        <div style="margin-bottom: 16px;">
            <h4>卡片骨架屏：</h4>
            <div id="skeleton-card" class="skeleton skeleton-card"></div>
        </div>
        
        <div style="margin-bottom: 16px;">
            <h4>列表骨架屏：</h4>
            <div id="skeleton-list-1" class="skeleton skeleton-list"></div>
            <div id="skeleton-list-2" class="skeleton skeleton-list"></div>
            <div id="skeleton-list-3" class="skeleton skeleton-list"></div>
        </div>
        
        <div style="margin-bottom: 16px;">
            <h4>表格骨架屏：</h4>
            <div id="skeleton-table-1" class="skeleton skeleton-table"></div>
            <div id="skeleton-table-2" class="skeleton skeleton-table"></div>
            <div id="skeleton-table-3" class="skeleton skeleton-table"></div>
        </div>
        
        <!-- 加载遮罩触发按钮 -->
        <button id="btn-loading-overlay" class="btn btn-primary" onclick="showLoading()">显示加载遮罩</button>
    </div>
</section>
