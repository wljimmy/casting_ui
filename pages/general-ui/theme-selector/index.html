<section class="section">
    <h2>主题选择器</h2>
    
    <div class="theme-selector-container">
        <div class="example-title">
            <h4>主题选择器</h4>
            <span class="example-info">主题管理组件</span>
        </div>
        <p>主题选择器允许用户切换不同的配色方案，即时生效，并且会自动保存到本地存储。</p>
        
        <div class="theme-selector-demo">
            <h5>使用说明：</h5>
            <ul>
                <li>点击下方按钮打开主题选择器</li>
                <li>选择一个主题，界面会立即更新</li>
                <li>刷新页面后，会保持上次选择的主题</li>
            </ul>
            
            <div class="theme-selector-buttons">
                <button class="btn btn-primary" onclick="openThemeSelector({ mode: 'modal' })">弹窗打开主题选择器</button>
                <button class="btn btn-default" onclick="openThemeSelector({ mode: 'inline', container: '#inlineThemeContainer' })">内联打开主题选择器</button>
            </div>
            
            <div id="inlineThemeContainer" class="inline-theme-container">
                <!-- 内联主题选择器将在这里显示 -->
            </div>
        </div>
    </div>
</section>
