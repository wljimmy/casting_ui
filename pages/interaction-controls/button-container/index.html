<section class="section">
    <h2>按钮</h2>
    
    <div class="button-container container-grid-4 container-height-auto">
        <!-- 按钮尺寸 -->
        <button id="btn-sm" class="btn btn-primary btn-sm">小按钮</button>
        <button id="btn-md" class="btn btn-primary btn-md">中按钮</button>
        <button id="btn-lg" class="btn btn-primary btn-lg">大按钮</button>
        
        <!-- 按钮样式 -->
        <button id="btn-primary" class="btn btn-primary">主要按钮</button>
        <button id="btn-secondary" class="btn btn-secondary">次要按钮</button>
        <button id="btn-text" class="btn btn-text">文本按钮</button>
        <button id="btn-icon" class="btn btn-icon btn-primary">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
        </button>
        <button id="btn-loading" class="btn btn-primary btn-loading">加载中</button>
        
        <!-- 按钮状态 -->
        <button id="btn-default" class="btn btn-primary">默认状态</button>
        <button id="btn-hover" class="btn btn-primary" style="cursor: pointer;">Hover状态</button>
        <button id="btn-disabled" class="btn btn-primary" disabled>禁用状态</button>
    </div>
</section>
