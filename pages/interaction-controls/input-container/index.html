<section class="section">
    <h2>输入框</h2>
    
    <div class="input-container container-height-auto">
        <!-- 单行输入框 -->
        <div id="input-group-1" class="input-group">
            <label class="input-label">单行输入框</label>
            <input id="input-text" type="text" class="input" placeholder="请输入内容">
            <span class="input-hint">这是提示信息</span>
        </div>
        
        <!-- 错误状态输入框 -->
        <div id="input-group-2" class="input-group">
            <label class="input-label">错误状态</label>
            <input id="input-error" type="text" class="input error" placeholder="请输入内容">
            <span class="input-error">这是错误信息</span>
        </div>
        
        <!-- 成功状态输入框 -->
        <div id="input-group-3" class="input-group">
            <label class="input-label">成功状态</label>
            <input id="input-success" type="text" class="input success" placeholder="请输入内容">
        </div>
        
        <!-- 禁用状态输入框 -->
        <div id="input-group-4" class="input-group">
            <label class="input-label">禁用状态</label>
            <input id="input-disabled" type="text" class="input" placeholder="请输入内容" disabled>
        </div>
        
        <!-- 多行输入框 -->
        <div id="input-group-5" class="input-group">
            <label class="input-label">多行输入框</label>
            <textarea id="textarea" class="textarea" placeholder="请输入内容"></textarea>
        </div>
        
        <!-- 数字输入框 -->
        <div id="input-group-6" class="input-group">
            <label class="input-label">数字输入框</label>
            <input id="input-number" type="number" class="input" placeholder="请输入数字">
        </div>
        
        <!-- 搜索输入框 -->
        <div id="input-group-7" class="input-group">
            <label class="input-label">搜索输入框</label>
            <input id="input-search" type="search" class="input" placeholder="请输入搜索内容">
        </div>
        
        <!-- 密码输入框 -->
        <div id="input-group-8" class="input-group">
            <label class="input-label">密码输入框</label>
            <input id="input-password" type="password" class="input" placeholder="请输入密码">
        </div>
    </div>
</section>
