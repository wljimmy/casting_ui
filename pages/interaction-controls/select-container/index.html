<section class="section">
    <h2>选择控件</h2>
    
    <div class="select-container container-height-auto">
        <!-- 单选框 -->
        <div id="radio-group-1" class="input-group">
            <label class="input-label">单选框（横向）</label>
            <div class="radio-group">
                <div class="radio-item">
                    <input id="radio1-1" type="radio" name="radio1">
                    <label for="radio1-1">选项1</label>
                </div>
                <div class="radio-item">
                    <input id="radio1-2" type="radio" name="radio1">
                    <label for="radio1-2">选项2</label>
                </div>
                <div class="radio-item">
                    <input id="radio1-3" type="radio" name="radio1">
                    <label for="radio1-3">选项3</label>
                </div>
            </div>
        </div>
        
        <!-- 复选框 -->
        <div id="checkbox-group-1" class="input-group">
            <label class="input-label">复选框（纵向）</label>
            <div class="checkbox-group vertical">
                <div class="checkbox-item">
                    <input id="checkbox1" type="checkbox">
                    <label for="checkbox1">选项1</label>
                </div>
                <div class="checkbox-item">
                    <input id="checkbox2" type="checkbox">
                    <label for="checkbox2">选项2</label>
                </div>
                <div class="checkbox-item">
                    <input id="checkbox3" type="checkbox">
                    <label for="checkbox3">选项3</label>
                </div>
            </div>
        </div>
        
        <!-- 下拉选择器 -->
        <div id="select-group-1" class="input-group">
            <label class="input-label">下拉选择器</label>
            <select id="select-1" class="select">
                <option value="">请选择</option>
                <option value="1">选项1</option>
                <option value="2">选项2</option>
                <option value="3">选项3</option>
            </select>
        </div>
        
        <!-- 开关 -->
        <div id="switch-group-1" class="input-group">
            <label class="input-label">开关（不同尺寸）</label>
            <div>
                <div>
                    <span>小</span>
                    <label id="switch-sm" class="switch switch-sm">
                        <input type="checkbox">
                        <span class="switch-slider"></span>
                    </label>
                </div>
                <div>
                    <span>中</span>
                    <label id="switch-md" class="switch">
                        <input type="checkbox">
                        <span class="switch-slider"></span>
                    </label>
                </div>
                <div>
                    <span>大</span>
                    <label id="switch-lg" class="switch switch-lg">
                        <input type="checkbox">
                        <span class="switch-slider"></span>
                    </label>
                </div>
            </div>
        </div>
        
        <!-- 滑块 -->
        <div id="slider-group-1" class="input-group">
            <label class="input-label">滑块</label>
            <input id="slider-1" type="range" class="slider" min="0" max="100" value="50">
        </div>
        
        <!-- 日期选择器 -->
        <div id="date-group-1" class="input-group">
            <label class="input-label">日期选择器</label>
            <input id="date-input-1" type="date" class="date-input">
        </div>
    </div>
</section>
