<section class="CUI-section">
    <h2>分隔组件</h2>
    
    <div class="CUI-box">
        <h4>水平分隔线：</h4>
        <div class="divider"></div>
        
        <h4>带文本的分隔线：</h4>
        <div class="divider with-text">
            <span>或</span>
        </div>
        
        <h4>虚线分隔线：</h4>
        <div class="divider dashed"></div>
        
        <h4>细分隔线：</h4>
        <div class="divider thin"></div>
        
        <h4>粗分隔线：</h4>
        <div class="divider thick"></div>
        
        <h4>垂直分隔线：</h4>
        <div>
            <span>左侧内容</span>
            <div class="divider vertical"></div>
            <span>右侧内容</span>
        </div>
    </div>
</section>
