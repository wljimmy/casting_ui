<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>核心模块测试</title>
    <link rel="stylesheet" href="../../modules/css/core.css">
    <link rel="stylesheet" href="../../modules/css/components.css">

</head>
<body>
    <div class="test-container">
        <h1>核心模块测试</h1>
        
        <div class="section">
            <h2>遮罩组件测试</h2>
            <p>测试遮罩组件的显示和隐藏功能。</p>
            
            <div class="button-group">
                <button class="btn btn-primary" onclick="testShowMask()">显示遮罩</button>
                <button class="btn btn-default" onclick="testHideMask()">隐藏遮罩</button>
            </div>
            
            <div class="result-container">
                <h3>操作结果：</h3>
                <div id="maskResult"></div>
            </div>
        </div>
        
        <div class="section">
            <h2>调试函数测试</h2>
            <p>测试调试函数的功能，查看控制台输出。</p>
            
            <div class="button-group">
                <button class="btn btn-primary" onclick="testDebug()">测试调试输出</button>
            </div>
            
            <div class="result-container">
                <h3>操作结果：</h3>
                <p>请查看浏览器控制台输出</p>
            </div>
        </div>
    </div>
    
    <script src="../../modules/js/core.js"></script>
    <script>
        let currentOverlayId = null;
        
        // 测试显示遮罩
        function testShowMask() {
            const mask = showOverlay();
            currentOverlayId = mask.id;
            document.getElementById('maskResult').textContent = '遮罩已显示';
            console.log('遮罩已显示:', mask);
        }
        
        // 测试隐藏遮罩
        function testHideMask() {
            if (currentOverlayId) {
                hideOverlay(currentOverlayId);
                currentOverlayId = null;
            }
            document.getElementById('maskResult').textContent = '遮罩已隐藏';
            console.log('遮罩已隐藏');
        }
        
        // 测试调试函数
        function testDebug() {
            debug('这是一条调试信息', { test: 'data' });
            console.log('调试函数测试完成');
        }
    </script>
</body>
</html>
