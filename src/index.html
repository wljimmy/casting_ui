<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casting UI Framework - 杂志风格UI手册</title>
    <link rel="icon" type="image/svg+xml" href="/icons/filled/apps.svg">
    <!-- 引入思源宋体CDN -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.cn/css2?family=Noto+Serif+SC:wght@400;600;700;900&display=swap">
    <link rel="stylesheet" href="./modules/css/core.css">
    <link rel="stylesheet" href="./modules/css/container.css">
    <link rel="stylesheet" href="./modules/css/layout.css">
    <link rel="stylesheet" href="./modules/css/text.css">
    <link rel="stylesheet" href="./modules/css/header.css">
    <link rel="stylesheet" href="./modules/css/animation.css">
    <link rel="stylesheet" href="./modules/css/responsive.css">
    <link rel="stylesheet" href="./modules/css/components.css">
    <link rel="stylesheet" href="./modules/css/status.css">
    <link rel="stylesheet" href="./modules/css/progress.css">
    <link rel="stylesheet" href="./modules/css/input.css">
    <link rel="stylesheet" href="./modules/css/prism/prism.css">
    <link rel="stylesheet" href="./modules/css/menu.css">

</head>

<body class="CUI-hidden-sidebar-right CUI-hidden-footer CUI-layout-web">
    <!-- 头部 -->
    <header>
        <div class="CUI-grid CUI-grid-2c CUI-grid-v-center">
            <div>
                <h1>Casting UI</h1>
                <p>极简UI组件库</p>
            </div>
            <div class="CUI-grid CUI-grid-right">
                <div class="header-search">
                    <input type="text" placeholder="搜索组件..." id="menuSearch" class="header-search-input">
                    <span class="header-search-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <use href="/icons/outline/search.svg#icon"></use>
                        </svg>
                    </span>
                </div>
            </div>
        </div>
    </header>

    <!-- 侧边栏菜单组件 -->
    <aside class="CUI-sidebar-left CUI-visible">
        <div class="CUI-fluid CUI-sticky">
            <menu id="magazineMenu" class="menu-sidebar ">
                <ul>
                    <!-- 初始化指南 -->
                    <li class="menu-active" data-id="init-guide"
                        data-action='{"url":"manual/init-guide/index.html","container":"#content-container"}'
                        data-default="true">初始化指南</li>

                    <!-- 基础布局组件 -->
                    <li data-id="basic-layout">基础布局组件
                        <ul>
                            <li data-id="card-container"
                                data-action='{"url":"manual/basic-layout/card-container/index.html","container":"#content-container"}'>
                                卡片容器</li>
                            <li data-id="general-container" data-badge="new"
                                data-action='{"url":"manual/basic-layout/general-container/index.html","container":"#content-container"}'>
                                通用容器</li>
                            <li data-id="button-container"
                                data-action='{"url":"manual/basic-layout/button-container/index.html","container":"#content-container"}'>
                                按钮</li>
                            <li data-id="layout-container" data-badge="new"
                                data-action='{"url":"manual/basic-layout/layout-container/index.html","container":"#content-container"}'>
                                布局容器</li>
                        </ul>
                    </li>

                    <!-- 数据展示组件 -->
                    <li data-id="data-display">数据展示组件
                        <ul>
                            <li data-id="badge-container" data-badge="new"
                                data-action='{"url":"manual/data-display/badge-container/index.html","container":"#content-container"}'>
                                徽章</li>
                            <li data-id="status-container"
                                data-action='{"url":"manual/data-display/status-container/index.html","container":"#content-container"}'>
                                状态栏</li>
                            <li data-id="progress-container"
                                data-action='{"url":"manual/data-display/progress-container/index.html","container":"#content-container"}'>
                                进度条</li>
                            <li data-id="icon-search"
                                data-action='{"url":"manual/data-display/icon-search/index.html","container":"#content-container"}'>
                                图标搜索</li>
                        </ul>
                    </li>

                    <!-- 反馈组件 -->
                    <li data-id="feedback-components">反馈组件
                        <ul>
                            <li data-id="modal-container-1"
                                data-action='{"url":"manual/feedback-components/modal-container-1/index.html","container":"#content-container"}'>
                                弹窗</li>
                            <li data-id="message-container" data-badge="new"
                                data-action='{"url":"manual/feedback-components/message-container/index.html","container":"#content-container"}'>
                                信息提示</li>
                            <li data-id="toast-container"
                                data-action='{"url":"manual/feedback-components/toast-container/index.html","container":"#content-container"}'>
                                Toast</li>
                        </ul>
                    </li>

                    <!-- 表单组件 -->
                    <li data-id="form-components">表单组件
                        <ul>
                            <li data-id="input-container"
                                data-action='{"url":"manual/form-components/input-container/index.html","container":"#content-container"}'>
                                输入框</li>
                            <li data-id="form-container"
                                data-action='{"url":"manual/form-components/form-container/index.html","container":"#content-container"}'>
                                表单布局</li>
                        </ul>
                    </li>

                    <!-- 通用UI元素 -->
                    <li data-id="general-ui">通用UI元素
                        <ul>
                            <li data-id="text-container"
                                data-action='{"url":"manual/general-ui/text-container/index.html","container":"#content-container"}'>
                                文本</li>
                        </ul>
                    </li>

                    <!-- 第三方插件 -->
                    <li data-id="third-party">第三方插件
                        <ul>
                            <li data-id="icon-search"
                                data-action='{"url":"manual/data-display/icon-search/index.html","container":"#content-container"}'>
                                图标搜索</li>
                        </ul>
                    </li>
                </ul>
            </menu>
        </div>
    </aside>

    <!-- 内容区域 -->
    <main id="content-container">
        <!-- 内容将通过JavaScript动态加载 -->
    </main>

    <!-- 右侧边栏（可选，目前隐藏） -->
    <aside class="CUI-sidebar-right" style="display: none;"></aside>

    <!-- 页脚 -->
    <footer>
        <div style="text-align: center; padding: 10px;">
            <p>Casting UI Framework v0.2.1 | © 2026 Bingo工作室</p>
        </div>
    </footer>

    <!-- 框架脚本 -->
    <script type="module" src="./modules/js/index.js"></script>
    <script src="./modules/js/prism/prism.js"></script>
</body>

</html>
