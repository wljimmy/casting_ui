<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消息提示模块测试</title>
    <link rel="stylesheet" href="../../dev/modules/css/core.css">
    <link rel="stylesheet" href="../../dev/modules/css/components.css">
    <style>
        .test-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .section {
            margin-bottom: 30px;
            padding: 20px;
            background-color: var(--bg-color);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
        }
        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        .result-container {
            margin-top: 20px;
            padding: 15px;
            background-color: var(--gray-100);
            border-radius: var(--radius-md);
            border-left: 4px solid var(--primary-color);
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>消息提示模块测试</h1>
        
        <div class="section">
            <h2>Toast消息测试</h2>
            <p>测试不同类型的Toast消息。</p>
            
            <div class="button-group">
                <button class="btn btn-primary" onclick="testSuccessToast()">成功消息</button>
                <button class="btn btn-default" onclick="testErrorToast()">错误消息</button>
                <button class="btn btn-default" onclick="testWarningToast()">警告消息</button>
                <button class="btn btn-default" onclick="testInfoToast()">信息消息</button>
            </div>
        </div>
        
        <div class="section">
            <h2>加载遮罩测试</h2>
            <p>测试加载遮罩的显示和隐藏。</p>
            
            <div class="button-group">
                <button class="btn btn-primary" onclick="testShowLoading()">显示加载遮罩</button>
                <button class="btn btn-default" onclick="testHideLoading()">隐藏加载遮罩</button>
                <button class="btn btn-default" onclick="testAutoHideLoading()">自动隐藏加载遮罩</button>
            </div>
        </div>
        
        <div class="section">
            <h2>消息提示测试</h2>
            <p>测试不同类型的消息提示。</p>
            
            <div class="button-group">
                <button class="btn btn-primary" onclick="testSuccessMessage()">成功提示</button>
                <button class="btn btn-default" onclick="testErrorMessage()">错误提示</button>
                <button class="btn btn-default" onclick="testWarningMessage()">警告提示</button>
                <button class="btn btn-default" onclick="testInfoMessage()">信息提示</button>
            </div>
        </div>
    </div>
    
    <script src="../../dev/modules/js/core.js"></script>
    <script src="../../dev/modules/js/message.js"></script>
    <script>
        // 测试成功Toast
        function testSuccessToast() {
            showToast('success', '操作成功');
        }
        
        // 测试错误Toast
        function testErrorToast() {
            showToast('error', '操作失败');
        }
        
        // 测试警告Toast
        function testWarningToast() {
            showToast('warning', '警告信息');
        }
        
        // 测试信息Toast
        function testInfoToast() {
            showToast('info', '提示信息');
        }
        
        // 测试显示加载遮罩
        function testShowLoading() {
            showLoading('加载中...');
        }
        
        // 测试隐藏加载遮罩
        function testHideLoading() {
            hideLoading();
        }
        
        // 测试自动隐藏加载遮罩
        function testAutoHideLoading() {
            showLoading('加载中...');
            setTimeout(() => {
                hideLoading();
                showToast('success', '加载完成');
            }, 2000);
        }
        
        // 测试成功提示
        function testSuccessMessage() {
            createMessage({ content: '操作成功', type: 'success' });
        }
        
        // 测试错误提示
        function testErrorMessage() {
            createMessage({ content: '操作失败', type: 'error' });
        }
        
        // 测试警告提示
        function testWarningMessage() {
            createMessage({ content: '警告信息', type: 'warning' });
        }
        
        // 测试信息提示
        function testInfoMessage() {
            createMessage({ content: '提示信息', type: 'info' });
        }
    </script>
</body>
</html>
